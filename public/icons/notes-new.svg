<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEAA7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDCB6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#00000020;stop-opacity:0.12" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="url(#noteGradient)" filter="url(#dropshadow)"/>
  
  <!-- 纸张底层 -->
  <rect x="12" y="16" width="40" height="48" rx="2" ry="2" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- 纸张顶层 -->
  <rect x="14" y="12" width="40" height="48" rx="2" ry="2" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  
  <!-- 文本行 -->
  <line x1="18" y1="22" x2="46" y2="22" stroke="#DDD6C1" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="18" y1="26" x2="42" y2="26" stroke="#DDD6C1" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="18" y1="30" x2="48" y2="30" stroke="#DDD6C1" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="40" y2="34" stroke="#DDD6C1" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- 标题文本（更粗的线条） -->
  <rect x="18" y="47" width="24" height="1.5" rx="0.75" fill="#F39C12"/>
  <rect x="18" y="50" width="18" height="1.2" rx="0.6" fill="#E67E22"/>
  
  <!-- 装饰元素 - 小圆点 -->
  <circle cx="20" cy="41" r="1" fill="#F39C12" opacity="0.6"/>
  <circle cx="24" cy="41" r="1" fill="#E67E22" opacity="0.6"/>
  <circle cx="28" cy="41" r="1" fill="#D35400" opacity="0.6"/>
</svg>