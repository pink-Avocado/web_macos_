<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - macOS Big Sur 风格的橙色 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8500;stop-opacity:1" />
    </linearGradient>
    
    <!-- 纸张渐变 -->
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9F9F9;stop-opacity:1" />
    </linearGradient>
    
    <!-- 高光渐变 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.12"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景 - macOS 风格圆角 -->
  <rect x="1" y="1" width="46" height="46" rx="10.5" ry="10.5" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- 纸张 -->
  <rect x="9" y="10" width="30" height="35" rx="2" ry="2" fill="url(#paperGradient)" stroke="#E8E8E8" stroke-width="0.5"/>
  
  <!-- 标题区域 -->
  <rect x="12" y="13" width="20" height="2" rx="1" fill="#FF9F0A" opacity="0.9"/>
  
  <!-- 文本行 -->
  <rect x="12" y="17" width="18" height="1" rx="0.5" fill="#D1D1D1"/>
  <rect x="12" y="19.5" width="22" height="1" rx="0.5" fill="#D1D1D1"/>
  <rect x="12" y="22" width="16" height="1" rx="0.5" fill="#D1D1D1"/>
  <rect x="12" y="24.5" width="20" height="1" rx="0.5" fill="#D1D1D1"/>
  <rect x="12" y="27" width="14" height="1" rx="0.5" fill="#D1D1D1"/>
  
  <!-- 底部装饰区域 -->
  <rect x="12" y="31" width="24" height="10" rx="1.5" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
  
  <!-- 装饰元素 -->
  <circle cx="15" cy="34" r="1" fill="#FF9F0A" opacity="0.7"/>
  <rect x="18" y="33.5" width="12" height="1" rx="0.5" fill="#FF9F0A" opacity="0.6"/>
  <rect x="18" y="35.5" width="8" height="0.8" rx="0.4" fill="#FF8500" opacity="0.6"/>
  
  <!-- 高光效果 -->
  <rect x="1" y="1" width="46" height="23" rx="10.5" ry="10.5" fill="url(#highlight)"/>
</svg>