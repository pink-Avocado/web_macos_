<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主要渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6D00;stop-opacity:1" />
    </linearGradient>
    <!-- 纸张渐变 -->
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FAFAFA;stop-opacity:1" />
    </linearGradient>
    <!-- 文字渐变 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6D00;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.1"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景 - 圆角矩形 -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#mainGradient)" filter="url(#dropshadow)"/>
  
  <!-- 纸张主体 -->
  <rect x="12" y="14" width="40" height="46" rx="3" ry="3" fill="url(#paperGradient)" stroke="#E5E5E5" stroke-width="0.5"/>
  
  <!-- 文本行 - 使用更现代的样式 -->
  <rect x="16" y="20" width="28" height="2" rx="1" fill="#FF9500" opacity="0.8"/>
  <rect x="16" y="25" width="24" height="1.5" rx="0.75" fill="#CCCCCC"/>
  <rect x="16" y="29" width="32" height="1.5" rx="0.75" fill="#CCCCCC"/>
  <rect x="16" y="33" width="20" height="1.5" rx="0.75" fill="#CCCCCC"/>
  <rect x="16" y="37" width="26" height="1.5" rx="0.75" fill="#CCCCCC"/>
  
  <!-- 底部装饰区域 -->
  <rect x="16" y="43" width="32" height="12" rx="2" fill="#F8F8F8" stroke="#E5E5E5" stroke-width="0.5"/>
  
  <!-- 装饰图标 - 笔的图标 -->
  <path d="M18 47 L20 45 L22 47 L20 49 Z" fill="url(#textGradient)" opacity="0.7"/>
  <rect x="24" y="46" width="12" height="1.5" rx="0.75" fill="url(#textGradient)" opacity="0.6"/>
  <rect x="24" y="49" width="8" height="1.2" rx="0.6" fill="url(#textGradient)" opacity="0.6"/>
  
  <!-- 高光效果 -->
  <rect x="2" y="2" width="60" height="30" rx="14" ry="14" fill="url(#highlight)" opacity="0.1"/>
  
  <defs>
    <!-- 高光渐变 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>